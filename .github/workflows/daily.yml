name: Daily Credit Digest

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 8:00 AM ET (UTC-4) weekdays
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests pytz yfinance pandas

      - name: Generate dashboard
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
           git add index.html financials_cache.json runs.json || true
          git diff --staged --quiet || git commit -m "Daily credit digest update"
          git push
