name: Daily Credit Digest
on:
  schedule:
    # 11:55 UTC = 7:55am ET (EDT) / 6:55am ET (EST)
    # Running 5 minutes off the top of the hour avoids GitHub Actions cron
    # congestion that delays scheduled runs by 5-30 min during high-load hours.
    # Mon-Thu = cheap mode (uses claude_cache.json from last Friday)
    # Friday = full mode (refreshes Claude Batches A+B + saves cache + runs audit)
    - cron: '55 11 * * 1-5'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Force run mode (auto/full/cheap). Default: auto.'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - full
          - cheap
permissions:
  contents: write
  pages: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic yfinance pandas pytz
      - name: Run generate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RUN_MODE: ${{ github.event.inputs.run_mode || 'auto' }}
        run: python generate.py
      - name: Run backtest audit (Fridays or full-mode manual)
        # Audits SEC EDGAR-derived fina
