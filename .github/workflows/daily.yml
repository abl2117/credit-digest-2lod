name: Daily Credit Digest
on:
  schedule:
    - cron: '55 11 * * 1-5'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Force run mode (auto/full/cheap). Default: auto.'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - full
          - cheap
permissions:
  contents: write
  pages: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic yfinance pandas pytz
      - name: Run generate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RUN_MODE: ${{ github.event.inputs.run_mode || 'auto' }}
        run: python generate.py
      - name: Diagnose file locations
        run: |
          echo "Current working directory:"
          pwd
          echo "Workspace path:"
          echo "$GITHUB_WORKSPACE"
          echo "All index.html files on this runner:"
          find / -name index.html 2>/dev/null
          echo "Stub match in current dir index.html:"
          grep -c "DATA QUALITY INVESTIGATION" index.html || echo "0"
          echo "Stub match in workspace index.html:"
          grep -c "DATA QUALITY INVESTIGATION" "$GITHUB_WORKSPACE/index.html" || echo "0"
          echo "Git status from current dir:"
          git status --short
          echo "Git status from workspace:"
          cd "$GITHUB_WORKSPACE" && git status --short
      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html runs.json macro_cache.json data_center_cache.json financials_cache.json claude_cache.json backtest_results.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Daily credit digest update"
          git push
