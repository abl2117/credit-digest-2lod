name: Daily Credit Digest
on:
  schedule:
    - cron: '55 11 * * 1-5'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Force run mode (auto/full/cheap). Default: auto.'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - full
          - cheap
permissions:
  contents: write
  pages: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic yfinance pandas pytz
      - name: Run generate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RUN_MODE: ${{ github.event.inputs.run_mode || 'auto' }}
        run: python generate.py
      - name: Commit updated files
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "===== git status BEFORE add ====="
          git status --short
          echo "===== checking if .gitignore lists any of our files ====="
          if [ -f .gitignore ]; then cat .gitignore; else echo "no .gitignore"; fi
          echo "===== adding files individually (errors visible) ====="
          for f in index.html runs.json macro_cache.json data_center_cache.json financials_cache.json claude_cache.json backtest_results.json; do
            if [ -f "$f" ]; then
              git add "$f"
              echo "Added: $f (exit=$?)"
            else
              echo "Skipped (file not present): $f"
            fi
          done
          echo "===== git status AFTER add ====="
          git status --short
          echo "===== staged diff stat ====="
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "Nothing staged — skipping commit."
          else
            git commit -m "Daily credit digest update"
            git push
          fi
          exit 0
