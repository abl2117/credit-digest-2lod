name: Daily Credit Digest
on:
  schedule:
    - cron: '55 11 * * 1-5'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Force run mode (auto/full/cheap). Default: auto.'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - full
          - cheap
permissions:
  contents: write
  pages: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic yfinance pandas pytz
      - name: Run generate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RUN_MODE: ${{ github.event.inputs.run_mode || 'auto' }}
        run: python generate.py
      - name: Diagnose
        run: |
          set +e
          echo "===== pwd ====="
          pwd
          echo "===== ls -la index.html ====="
          ls -la index.html
          echo "===== stub match count ====="
          grep -c "DATA QUALITY INVESTIGATION" index.html
          echo "===== git status --short ====="
          git status --short
          echo "===== git diff HEAD --stat -- index.html ====="
          git diff HEAD --stat -- index.html
          echo "===== git rev-parse HEAD ====="
          git rev-parse HEAD
          echo "===== first 5 lines of HEAD's index.html ====="
          git show HEAD:index.html | head -5
          echo "===== first 5 lines of current index.html ====="
          head -5 index.html
          echo "===== MD5 of current index.html ====="
          md5sum index.html
          echo "===== MD5 of HEAD's index.html ====="
          git show HEAD:index.html | md5sum
          echo "===== done ====="
          exit 0
      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html runs.json macro_cache.json data_center_cache.json financials_cache.json claude_cache.json backtest_results.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Daily credit digest update"
          git push
