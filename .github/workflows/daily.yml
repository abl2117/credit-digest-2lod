name: Daily Credit Digest
on:
  schedule:
    # Primary: 12:07 UTC = 8:07am ET (EDT) / 7:07am ET (EST).
    # Off-the-hour minute reduces GitHub Actions cron contention vs :00/:30
    # slots; primary runs typically dispatch within 5-15 minutes.
    # Backup: 13:23 UTC = 9:23am ET (EDT) / 8:23am ET (EST). If the primary
    # is delayed past 13:23 UTC, the backup fires and the workflow runs.
    # Once one run completes, the other is a no-op (cheap mode reuses cache).
    # Mon-Thu = cheap mode (cache reuse), Friday = full mode (refresh + audit).
    - cron: '7 12 * * 1-5'
    - cron: '23 13 * * 1-5'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Force run mode (auto/full/cheap). Default: auto.'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - full
          - cheap
permissions:
  contents: write
  pages: write
jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic yfinance pandas pytz
      - name: Run generate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RUN_MODE: ${{ github.event.inputs.run_mode || 'auto' }}
        run: python generate.py
      - name: Run backtest audit (Fridays or full-mode manual)
        # Runs Fridays scheduled, or when manual trigger forces full mode.
        # continue-on-error so audit failures do not block the dashboard commit.
        # ANTHROPIC_API_KEY is passed because backtest_audit.py imports WATCHLIST
        # from generate.py, which initializes the anthropic client at import time.
        # The audit itself does not call Claude, but the import side-effect needs
        # the env var to be present.
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          DOW=$(date -u +%u)
          RUN_MODE_INPUT="${{ github.event.inputs.run_mode }}"
          if [ "$DOW" = "5" ] || [ "$RUN_MODE_INPUT" = "full" ]; then
            echo "Audit conditions met (day-of-week=$DOW, run_mode=$RUN_MODE_INPUT); running backtest audit..."
            python backtest_audit.py || echo "Audit completed with non-fatal warnings."
          else
            echo "Audit skipped (day-of-week=$DOW, run_mode=$RUN_MODE_INPUT). Audit runs Fridays or with full mode."
          fi
      - name: Commit updated files
        # Per-file add loop. Previous version with a single `git add` line and
        # `2>/dev/null || true` was silently swallowing errors, leading to
        # spurious empty commits when one of the listed files didn't exist.
        # This version adds each file only if present and prints the result.
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in index.html runs.json macro_cache.json data_center_cache.json financials_cache.json claude_cache.json backtest_results.json; do
            if [ -f "$f" ]; then
              git add "$f"
            fi
          done
          if git diff --cached --quiet; then
            echo "Nothing staged — skipping commit."
          else
            git commit -m "Daily credit digest update"
            git push
          fi
          exit 0
